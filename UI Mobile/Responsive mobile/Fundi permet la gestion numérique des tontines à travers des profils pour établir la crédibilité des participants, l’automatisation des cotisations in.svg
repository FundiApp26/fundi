<svg xmlns="http://www.w3.org/2000/svg" width="382" height="146" viewBox="0 0 382 146">
  <text id="Fundi_permet_la_gestion_numérique_des_tontines_à_travers_des_profils_pour_établir_la_crédibilité_des_participants_l_automatisation_des_cotisations_individuelles_et_de_leur_suivi." data-name="Fundi permet la gestion numérique des tontines à travers des profils pour établir la crédibilité des participants, l’automatisation des cotisations individuelles et de leur suivi." fill="#4c504a" font-size="18" font-family="OpenSans-Semibold, Open Sans" font-weight="600"><tspan x="24" y="19">Fundi </tspan><tspan y="19" font-family="OpenSans, Open Sans" font-weight="400">permet la gestion numérique des </tspan><tspan x="10" y="47" font-family="OpenSans, Open Sans" font-weight="400">tontines à travers des profils pour établir la </tspan><tspan x="8" y="75" font-family="OpenSans, Open Sans" font-weight="400">crédibilité des participants, l’automatisation </tspan><tspan x="7" y="103" font-family="OpenSans, Open Sans" font-weight="400">des cotisations individuelles et de leur suivi.</tspan></text>
</svg>

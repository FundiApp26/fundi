<ion-content [fullscreen]="true" class="forgot-content" [scrollY]="false">
  <div class="page-container">
    <div class="back-arrow" (click)="goBack()">
      <ion-icon name="arrow-back-outline"></ion-icon>
    </div>

    <!-- Phase 1: Phone number -->
    <ng-container *ngIf="phase === 'phone'">
      <h1>Mot de passe oublié</h1>

      <div class="field-group">
        <label>Entrer votre numéro de téléphone</label>
        <div class="input-box">
          <input type="tel" [value]="'+237 – ' + phoneNumber" readonly />
        </div>
      </div>

      <p class="hint-text">Un code vous sera envoyer par SMS</p>

      <div class="spacer"></div>

      <ion-button expand="block" color="primary" class="action-btn"
        [disabled]="phoneNumber.length < 9" (click)="sendCode()">
        ENVOYER LE CODE
      </ion-button>
    </ng-container>

    <!-- Phase 2: OTP 4 circles -->
    <ng-container *ngIf="phase === 'verify'">
      <h1>Vérification</h1>
      <p class="subtitle">Entrer votre code de vérification</p>

      <div class="otp-circles">
        <div *ngFor="let d of otpDigits; let i = index"
          class="otp-circle" [class.filled]="d !== ''">
          <span *ngIf="d !== ''">{{ d }}</span>
        </div>
      </div>

      <div class="spacer"></div>

      <ion-button expand="block" color="primary" class="action-btn"
        [disabled]="otpValue.length < 4" (click)="verifyCode()">
        ENVOYER LE CODE
      </ion-button>
    </ng-container>

    <!-- Phase 3: New password with underline inputs -->
    <ng-container *ngIf="phase === 'newpass'">
      <h1>Nouveau mot de passe</h1>
      <p class="error" *ngIf="error">{{ error }}</p>

      <div class="field-underline">
        <label>Entrer le nouveau mot de passe *</label>
        <input type="password" [(ngModel)]="newPassword" placeholder="******************" />
        <div class="underline"></div>
      </div>

      <div class="field-underline">
        <label>Confirmer le nouveau mot de passe</label>
        <input type="password" [(ngModel)]="confirmPassword" placeholder="******************" />
        <div class="underline"></div>
      </div>

      <div class="spacer-sm"></div>

      <ion-button expand="block" color="primary" class="action-btn" (click)="savePassword()">
        SAUVEGARDER
      </ion-button>
    </ng-container>
  </div>

  <!-- Custom keypad for all phases -->
  <div class="keypad">
    <div class="keypad-row" *ngFor="let row of keypad">
      <div *ngFor="let key of row"
        class="keypad-key" [class.special]="key.d === '+'"
        (click)="phase === 'newpass' ? onNewPassKey(key.d) : onKeyAction(key.d)">
        <ng-container *ngIf="key.d !== 'back' && key.d !== '+'">
          <span class="key-digit">{{ key.d }}</span>
          <span class="key-sub" *ngIf="key.sub">{{ key.sub }}</span>
        </ng-container>
        <span *ngIf="key.d === '+'" class="key-digit special-text">+ * #</span>
        <ion-icon *ngIf="key.d === 'back'" name="backspace-outline" class="backspace-icon"></ion-icon>
      </div>
    </div>
  </div>
</ion-content>

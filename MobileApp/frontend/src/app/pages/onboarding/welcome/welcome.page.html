<ion-content [fullscreen]="true" class="welcome-content" [scrollY]="false">
  <div class="welcome-container">

    <!-- Logo droit -->
    <div class="logo-section">
      <img src="assets/logo/logo-straight.png" alt="Fundi" class="logo-img" />
    </div>

    <!-- Welcome text -->
    <div class="welcome-text">
      <h1>Welcome to<br/>Fundi</h1>
    </div>

    <div class="spacer"></div>

    <!-- Legal links -->
    <div class="legal-links">
      <p>
        Please read our <a href="#" (click)="$event.preventDefault()">privacy policy</a>.
        Press "accept and continue" to accept the <a href="#" (click)="$event.preventDefault()">terms of use</a>
      </p>
    </div>

    <!-- Accept button -->
    <div class="action-section">
      <ion-button expand="block" class="accept-btn" (click)="acceptAndContinue()">
        ACCEPTER ET CONTINUER
      </ion-button>
    </div>

  </div>

  <!-- Bande africaine -->
  <div class="pattern-footer">
    <img src="assets/patterns/bande-africaine-footer.png" alt="" />
  </div>
</ion-content>

<ion-content [fullscreen]="true" class="splash-content" [scrollY]="false">
  <div class="splash-container">

    <!-- Phase 1: Tilted logo -->
    <div class="logo-tilted" *ngIf="phase === 'tilted'">
      <img src="assets/logo/logo-full.png" alt="Fundi" />
    </div>

    <!-- Phase 2 & 3: Straight logo -->
    <div class="logo-straight" *ngIf="phase !== 'tilted'">
      <img src="assets/logo/logo-straight.png" alt="Fundi" />
    </div>

    <!-- Phase 3: Slogan -->
    <div class="slogan" [class.visible]="phase === 'slogan'">
      <p>GÉREZ FACILEMENT VOS TONTINES,<br/>EN TOUTE SÉCURITÉ</p>
    </div>

  </div>

  <!-- African pattern footer -->
  <div class="pattern-footer">
    <img src="assets/patterns/bande-africaine-footer.png" alt="" />
  </div>
</ion-content>

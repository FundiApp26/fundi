<ion-content [fullscreen]="true" class="splash-content" [scrollY]="false">
  <div class="splash-container">
    <!-- Logo icon -->
    <div class="logo-wrapper" [class.with-name]="phase !== 'logo'">
      <img src="assets/logo/logo-full.png" alt="Common Safe" class="logo-icon" />
    </div>

    <!-- App name -->
    <div class="app-name" [class.visible]="phase === 'name' || phase === 'slogan'">
      <h1>COMMON SAFE</h1>
    </div>

    <!-- Slogan -->
    <div class="slogan" [class.visible]="phase === 'slogan'">
      <p>TONTINER AUTREMENT</p>
    </div>
  </div>

  <!-- African pattern footer -->
  <div class="pattern-footer">
    <img src="assets/patterns/african-geometric-footer.svg" alt="" />
  </div>
</ion-content>
